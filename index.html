<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Portfolio Log — 월적립 투자 기록</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>

<!-- ── HEADER ─────────────────────────────────── -->
<header>
  <div>
    <div class="logo">PORTFOLIO<span>.</span>LOG</div>
    <div class="header-sub">월적립 투자 기록 — 정적 사이트</div>
  </div>
  <div class="header-actions">
    <button class="btn btn-ghost"  onclick="IO.triggerImport()">📂 불러오기</button>
    <button class="btn btn-ghost"  onclick="IO.exportJSON()">💾 내보내기</button>
    <button class="btn btn-accent" onclick="UI.openModal()">＋ 매수 기록</button>
  </div>
</header>

<!-- 파일 입력 (숨김) -->
<input type="file" id="importFile" accept=".json" style="display:none"
       onchange="IO.handleImport(event)"/>

<!-- ── MAIN ───────────────────────────────────── -->
<main>

  <!-- 요약 카드 -->
  <div class="summary-grid" id="summaryGrid"></div>

  <!-- 탭 -->
  <div class="tabs">
    <button class="tab active" onclick="UI.switchTab('monthly', this)">월별 보기</button>
    <button class="tab"        onclick="UI.switchTab('all',     this)">전체 목록</button>
    <button class="tab"        onclick="UI.switchTab('assets',  this)">종목별 요약</button>
  </div>

  <!-- 월별 뷰 -->
  <div id="tab-monthly">
    <div class="section-header">
      <div class="section-title">월별 <span>매수</span> 기록</div>
      <button class="btn btn-accent" onclick="UI.openModal()">＋ 추가</button>
    </div>
    <div id="monthlyView"></div>
  </div>

  <!-- 전체 목록 -->
  <div id="tab-all" style="display:none">
    <div class="section-header">
      <div class="section-title">전체 <span>거래</span> 목록</div>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>날짜</th><th>증권사</th><th>종목</th><th>티커</th>
            <th class="num">수량</th><th class="num">단가</th>
            <th class="num">금액</th><th>메모</th><th></th>
          </tr>
        </thead>
        <tbody id="allTableBody"></tbody>
      </table>
    </div>
  </div>

  <!-- 종목별 요약 -->
  <div id="tab-assets" style="display:none">
    <div class="section-header">
      <div class="section-title">종목별 <span>보유</span> 요약</div>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>종목</th><th>티커</th><th>증권사</th>
            <th class="num">총 수량</th><th class="num">평균 단가</th>
            <th class="num">총 투자금</th><th class="num">매수 횟수</th>
          </tr>
        </thead>
        <tbody id="assetTableBody"></tbody>
      </table>
    </div>
  </div>

</main>

<!-- ── ADD MODAL ──────────────────────────────── -->
<div class="modal-overlay" id="modalOverlay" onclick="UI.closeModalOutside(event)">
  <div class="modal">
    <div class="modal-title">매수 <span>기록</span> 추가</div>
    <div class="form-grid">

      <div class="form-row">
        <div class="field">
          <label>매수일 *</label>
          <input type="date" id="f-date"/>
        </div>
        <div class="field">
          <label>증권사 *</label>
          <input type="text" id="f-broker" placeholder="예) 토스증권, 키움"/>
        </div>
      </div>

      <div class="form-row">
        <div class="field">
          <label>종목명 *</label>
          <input type="text" id="f-name" placeholder="예) S&amp;P500 ETF"/>
        </div>
        <div class="field">
          <label>티커 / 코드 *</label>
          <input type="text" id="f-ticker" placeholder="예) SPY, 069500"/>
        </div>
      </div>

      <div class="form-row">
        <div class="field">
          <label>통화</label>
          <select id="f-currency"></select>
        </div>
        <div class="field">
          <label>단가 *</label>
          <input type="number" id="f-price" placeholder="0" min="0" step="any"/>
        </div>
      </div>

      <div class="form-row">
        <div class="field">
          <label>수량 *</label>
          <input type="number" id="f-qty" placeholder="0" min="0" step="any"/>
        </div>
        <div class="field">
          <label>수수료 (선택)</label>
          <input type="number" id="f-fee" placeholder="0" min="0" step="any"/>
        </div>
      </div>

      <div class="field">
        <label>메모 (선택)</label>
        <input type="text" id="f-memo" placeholder="자유롭게 입력"/>
      </div>

    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost"  onclick="UI.closeModal()">취소</button>
      <button class="btn btn-accent" onclick="App.saveRecord()">저장</button>
    </div>
  </div>
</div>

<!-- ── TOAST ──────────────────────────────────── -->
<div class="toast" id="toast"></div>

<!-- ── SCRIPTS (의존성 순서대로) ──────────────── -->
<script src="js/config.js"></script>
<script src="js/store.js"></script>
<script src="js/utils.js"></script>
<script src="js/ui.js"></script>
<script src="js/io.js"></script>
<script src="js/app.js"></script>

</body>
</html>
